name: Deploy Pod to Kind

on: 
  workflow_dispatch:

jobs:
  kind-deploy:
    runs-on: arc-runner-set

    steps:
      - name: Create Pod Manifest
        run: |
          cat <<EOF > pod-hola-mundo.yaml
          apiVersion: v1
          kind: Pod
          metadata:
            name: hola-mundo-kind
            namespace: default
          spec:
            containers:
            - name: hello
              image: busybox:1.36
              command: ['sh', '-c', 'echo "¡Hola desde el clúster Kind!" && sleep 3600']
          EOF

      - name: Apply Manifest
        run: |
          kubectl apply -f pod-hola-mundo.yaml

      - name: Wait and Verify
        run: |
          # Esperamos unos segundos para que se cree
          sleep 5
          kubectl get pod hola-mundo-kind
          kubectl logs hola-mundo-kind
