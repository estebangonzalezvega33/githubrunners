name: Deploy Keycloak on KIND (Lab)

on:
  push:
    branches:
      - main

jobs:
  deploy-keycloak:
    runs-on: arc-runner-set

    steps:

      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install kubectl
      - name: Install kubectl
        run: |
          set -e
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          mkdir -p $HOME/.local/bin
          mv kubectl $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # 3️⃣ Install Helm
      - name: Install Helm
        run: |
          set -e
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # 4️⃣ Verificar acceso al cluster
      - name: Verify cluster access
        run: |
          set -e
          kubectl cluster-info
          kubectl get nodes

      # 5️⃣ Limpieza completa del namespace (modo laboratorio)
      - name: Clean previous deployment
        run: |
          set -e

          if kubectl get namespace keycloak > /dev/null 2>&1; then
            echo "Eliminando namespace keycloak..."
            kubectl delete namespace keycloak
            kubectl wait --for=delete namespace/keycloak --timeout=180s
          fi

          echo "Creando namespace limpio..."
          kubectl create namespace keycloak

      # 6️⃣ Deploy Keycloak
      - name: Deploy Keycloak
        run: |
          set -e

          helm repo add codecentric https://codecentric.github.io/helm-charts
          helm repo update

          helm upgrade --install keycloak codecentric/keycloakx \
            --namespace keycloak \
            -f values.yaml \
            --wait \
            --timeout 15m

      # 7️⃣ Debug automático si falla
      - name: Debug if failure
        if: failure()
        run: |
          echo "===== PODS ====="
          kubectl get pods -n keycloak -o wide

          echo "===== DESCRIBE ====="
          kubectl describe pods -n keycloak

          echo "===== LOGS ====="
          for pod in $(kubectl get pods -n keycloak -o jsonpath='{.items[*].metadata.name}'); do
            echo "Logs for $pod"
            kubectl logs -n keycloak $pod || true
          done
